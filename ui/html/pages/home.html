{{ define "title" }} Home {{ end }}

{{ define "main"}}
  <div class="container text-center">
    <br>
    <h1 class="display-4 text-primary mb-3">🗓️ Sundays : 3pm </h1>
    <h5 class="display-6"> Game Status </h5>
    {{ if eq .GameStatus "CANCELED"}}
      <p class="lead text-danger">
        🚨 As of {{.Date}} – {{.GameStatus}} 🚨
      </p>
    {{ else }}
      <p class="lead text-success">
         🟢 As of {{.Date}} – {{.GameStatus}} 🟢
      </p>
    {{ end }}
   <br>
