{{ define "title" }} Admin {{ end }}

{{ define "main"}}
<div class="container" style="max-width: 600px;">
  <br>
  <h2>Admin Panel</h2>
  <hr>

  <h5>Game Status</h5>
  <p>Current status:
    {{ if eq .GameStatus "CANCELED"}}
      <span class="text-danger fw-bold">{{ .GameStatus }}</span>
    {{ else }}
      <span class="text-success fw-bold">{{ .GameStatus }}</span>
    {{ end }}
  </p>

  <div class="d-flex gap-2 mb-4">
    <form method="POST" action="/admin/game-status">
      <input type="hidden" name="status" value="gameon">
      <button type="submit" class="btn btn-success">Set GAME ON</button>
    </form>
    <form method="POST" action="/admin/game-status">
      <input type="hidden" name="status" value="canceled">
      <button type="submit" class="btn btn-danger">Set CANCELED (12h)</button>
    </form>
  </div>

  <hr>
  <form method="POST" action="/admin/logout">
    <button type="submit" class="btn btn-secondary">Logout</button>
  </form>
</div>
{{ end }}
